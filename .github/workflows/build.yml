name: Build IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.0.app/Contents/Developer

      - name: Build Archive
        run: |
          cd ios-app
          xcodebuild -project Yunxi.xcodeproj \
            -scheme Yunxi \
            -configuration Release \
            -archivePath build/Yunxi.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Export IPA
        run: |
          cd ios-app/build
          mkdir -p Payload
          cp -r Yunxi.xcarchive/Products/Applications/Yunxi.app Payload/
          zip -r Yunxi.ipa Payload
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Yunxi
          path: ios-app/build/Yunxi.ipa
          retention-days: 30

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: ios-app/build/Yunxi.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
